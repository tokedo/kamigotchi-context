services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kamigotchi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kamigotchi}
      POSTGRES_DB: ${POSTGRES_DB:-kamigotchi}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kamigotchi}"]
      interval: 5s
      timeout: 3s
      retries: 10

  indexer:
    image: ghcr.io/latticexyz/store-indexer:latest
    platform: linux/amd64
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RPC_HTTP_URL: ${RPC_HTTP_URL:-https://jsonrpc-yominet-1.anvil.asia-southeast.initia.xyz}
      DATABASE_URL: postgres://${POSTGRES_USER:-kamigotchi}:${POSTGRES_PASSWORD:-kamigotchi}@postgres:5432/${POSTGRES_DB:-kamigotchi}
      STORE_ADDRESS: ${STORE_ADDRESS:-0x2729174c265dbBd8416C6449E0E813E88f43D0E7}
      START_BLOCK: ${START_BLOCK:-0}
      MAX_BLOCK_RANGE: ${MAX_BLOCK_RANGE:-1000}
      POLLING_INTERVAL: ${POLLING_INTERVAL:-1000}
      FOLLOW_BLOCK_TAG: ${FOLLOW_BLOCK_TAG:-latest}
    ports:
      - "${INDEXER_PORT:-3001}:3001"
    # postgres-decoded starts both the indexer backend and API frontend
    command: pnpm start:postgres-decoded
    restart: unless-stopped

volumes:
  pgdata:
